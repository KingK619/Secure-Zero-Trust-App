trigger:
- main

pool:
  name: Default

variables:
  terraformDir: terraform
  resourceGroupName: zero-trust-rg

stages:

# ==========================================
# STAGE 1 - VALIDATE
# ==========================================
- stage: Validate
  jobs:
  - job: ValidateJob
    steps:
    - script: |
        cd $(terraformDir)
        terraform init
        terraform fmt -check
        terraform validate
      displayName: Terraform Validate

# ==========================================
# STAGE 2 - PLAN
# ==========================================
- stage: Plan
  dependsOn: Validate
  jobs:
  - job: PlanJob
    steps:
    - script: |
        cd $(terraformDir)
        terraform init
        terraform plan
      env:
        TF_VAR_db_password: $(TF_VAR_db_password)
      displayName: Terraform Plan

# ==========================================
# STAGE 3 - APPROVAL
# ==========================================
- stage: Approval
  dependsOn: Plan
  jobs:
  - job: ApprovalJob
    pool: server
    steps:
    - task: ManualValidation@0
      inputs:
        instructions: 'Review Terraform plan and approve apply.'
      displayName: Manual Approval

# ==========================================
# STAGE 4 - APPLY
# ==========================================
- stage: Apply
  dependsOn: Approval
  jobs:
  - job: ApplyJob
    steps:

    # Check if RG exists. If yes, import into Terraform state.
    - script: |
        echo Checking if Resource Group exists...

        az group show --name $(resourceGroupName)

        IF %ERRORLEVEL% EQU 0 (
          echo Resource Group exists. Importing into Terraform state...

          cd $(terraformDir)

          terraform init

          terraform import azurerm_resource_group.rg /subscriptions/$(AZURE_SUBSCRIPTION_ID)/resourceGroups/$(resourceGroupName)
        ) ELSE (
          echo Resource Group does not exist. Terraform will create it.
        )
      displayName: Detect / Import Existing RG

    - script: |
        cd $(terraformDir)
        terraform init
        terraform apply -auto-approve
      env:
        TF_VAR_db_password: $(TF_VAR_db_password)
      displayName: Terraform Apply

# ==========================================
# STAGE 5 - BUILD APP
# ==========================================
- stage: Build
  dependsOn: Apply
  jobs:
  - job: BuildJob
    steps:

    - script: |
        python -m venv venv
        call venv\Scripts\activate
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: Install Dependencies

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: .
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/app.zip
        replaceExistingArchive: true
      displayName: Archive App

    - publish: $(Build.ArtifactStagingDirectory)/app.zip
      artifact: drop
      displayName: Publish Artifact

# ==========================================
# STAGE 6 - DEPLOY APP
# ==========================================
- stage: Deploy
  dependsOn: Build
  jobs:
  - job: DeployJob
    steps:

    - download: current
      artifact: drop

    - task: AzureWebApp@1
      inputs:
        azureSubscription: AzureConnection
        appType: webAppLinux
        appName: $(WEBAPP_NAME)
        package: $(Pipeline.Workspace)/drop/app.zip
        startUpCommand: gunicorn --bind=0.0.0.0:8000 app:app
      displayName: Deploy to Azure App Service