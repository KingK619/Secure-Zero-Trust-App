trigger:
  - main

pool:
  name: 'Default'

variables:
  azureServiceConnectionId: 'AzureConnection'
  webAppName: 'secureflaskapp54321'
  resourceGroup: 'zero-trust-rg'
  projectRoot: $(System.DefaultWorkingDirectory)

stages:
  # ==========================================================
  # STAGE 1 - BUILD
  # ==========================================================
  - stage: Build
    displayName: 'Build and Package Phase'

    jobs:
      - job: BuildJob
        displayName: 'Build Application'

        steps:
          - checkout: self

          - task: ArchiveFiles@2
            displayName: 'Archive Application (source only)'
            inputs:
              rootFolderOrFile: '$(projectRoot)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true

          - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
            artifact: drop
            displayName: 'Publish Build Artifact'

  # ==========================================================
  # STAGE 2 - DEPLOY
  # ==========================================================
  - stage: Deploy
    displayName: 'Production Deployment Phase'
    dependsOn: Build

    jobs:
      - job: DeployJob
        displayName: 'Deploy to Azure App Service'

        steps:
          - download: current
            artifact: drop

          - task: AzureCLI@2
            displayName: 'Enable Build During Deployment'
            inputs:
              azureSubscription: $(azureServiceConnectionId)
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                az webapp config appsettings set `
                  --name $(webAppName) `
                  --resource-group $(resourceGroup) `
                  --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true

          - task: AzureWebApp@1
            displayName: 'Deploy to Azure App Service'
            inputs:
              azureSubscription: $(azureServiceConnectionId)
              appType: 'webAppLinux'
              appName: $(webAppName)
              package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
              startUpCommand: 'gunicorn --bind=0.0.0.0:8000 --timeout 600 app:app'
