trigger:
  - main

pool:
  name: Default

variables:
  WEBAPP_NAME: secureflaskapp54321

stages:
  # ==========================================================
  # STAGE 1 - BUILD APPLICATION
  # ==========================================================
  - stage: Build
    displayName: Build Flask App

    jobs:
      - job: BuildJob
        displayName: Package Application

        steps:
          - script: |
              python -m venv venv
              call venv\Scripts\activate
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: Install Dependencies

          - task: ArchiveFiles@2
            displayName: Create ZIP Artifact
            inputs:
              rootFolderOrFile: .
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/app.zip
              replaceExistingArchive: true

          - publish: $(Build.ArtifactStagingDirectory)/app.zip
            artifact: drop
            displayName: Publish Build Artifact

  # ==========================================================
  # STAGE 2 - DEPLOY APPLICATION
  # ==========================================================
  - stage: Deploy
    displayName: Deploy to Azure App Service
    dependsOn: Build

    jobs:
      - job: DeployJob
        displayName: Release Web App

        steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: Deploy ZIP Package
            inputs:
              azureSubscription: AzureConnection
              appType: webAppLinux
              appName: $(WEBAPP_NAME)
              package: $(Pipeline.Workspace)/drop/app.zip
              startUpCommand: gunicorn --bind=0.0.0.0:8000 app:app

  # ==========================================================
  # STAGE 3 - HEALTH CHECK
  # ==========================================================
  - stage: Test
    displayName: Smoke Test
    dependsOn: Deploy

    jobs:
      - job: TestJob
        displayName: Validate Live App

        steps:
          - task: AzureCLI@2
            displayName: Test /health Endpoint
            inputs:
              azureSubscription: AzureConnection
              scriptType: ps
              scriptLocation: inlineScript
              inlineScript: |
                $url = "https://$(WEBAPP_NAME).azurewebsites.net/health"
                Write-Host "Checking $url"

                $maxAttempts = 10
                $delaySeconds = 10

                for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
                  try {
                    $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 30
                    Write-Host "Attempt ${attempt}: HTTP $($response.StatusCode)"
                    Write-Host $response.Content
                    exit 0
                  }
                  catch {
                    Write-Warning "Attempt ${attempt} failed: $($_.Exception.Message)"
                    if ($_.Exception.Response -ne $null) {
                      try {
                        $resp = $_.Exception.Response
                        Write-Warning "Remote status: $($resp.StatusCode) $($resp.StatusDescription)"
                      } catch {}
                    }
                    if ($attempt -lt $maxAttempts) {
                      Write-Host "Waiting $delaySeconds seconds before retry..."
                      Start-Sleep -Seconds $delaySeconds
                    } else {
                      Write-Error "Health check failed after $maxAttempts attempts."
                      exit 1
                    }
                  }
                }
